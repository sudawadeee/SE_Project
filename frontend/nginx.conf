server {
    listen 80;
    server_name localhost;

    # Serve React SPA
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy → model-service (skin classifier)
    location /api/predict {
        proxy_pass http://model-service:5000/api/predict;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 10M;
    }

    # Reverse proxy → chatbot-service (RAG chatbot)
    location /api/chat {
        proxy_pass http://chatbot-service:5001/api/chat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Reverse proxy → chatbot-service embed API
    location /api/embed {
        proxy_pass http://chatbot-service:5001/api/embed;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 10M;
    }
}
